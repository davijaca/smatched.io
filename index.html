<!DOCTYPE html>

  <head>

    <link rel="icon" href="%PUBLIC_URL%./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto:wght@700&display=swap" rel="stylesheet">

    <!--
      manifest.json provides metadata used when your web app is installed on a

    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Smatched",
        "logo": "https://www.smatched.io/wp-content/uploads/2022/07/logo-1.svg",
        "description": "Smatched customizes 'earn-to-play' offerwalls to boost monetization and retain users for your app or website. Boost your monetization with Smatched.",
        "url": "https://www.smatched.io",
        "sameAs": [
          "https://de-de.facebook.com/smatched/",
          "https://www.instagram.com/smatched/",
          "https://www.linkedin.com/company/smatchedapp/",
          "https://www.tiktok.com/@smatched",
          "https://www.youtube.com/channel/UCdK1v6picTbgR1OU-4H7LYw"
        ]
      }
      </script>   <!--mail adress and phone number can be added.-->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://www.smatched.io/"
          }
        ]
      }
